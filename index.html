<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Abdomen Font Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #eaeaea;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
  }

  h1 { margin-bottom: 10px; }

  textarea {
    width: 90%;
    max-width: 700px;
    height: 120px;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
  }

  .output {
    width: 90%;
    max-width: 700px;
    min-height: 120px;
    margin-top: 20px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    white-space: pre-wrap;
    font-size: 20px;
  }

  button {
    margin-top: 10px;
    padding: 10px 15px;
    background: #2a2a2a;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #3a3a3a;
  }
</style>
</head>

<body>

<h1>Abdomen Font Generator</h1>

<textarea id="input" placeholder="Type here..."></textarea>

<div class="output" id="output"></div>

<button onclick="copyText()">Copy Output</button>

<script>
const map = {
  a: "0",
  b: "θ",
  c: "]",
  d: "\\",
  e: "<",
  f: "∫",
  g: "q",
  h: "ϟ",
  i: "⊂⊃",
  j: "ʝ",
  k: "☐",
  l: "¿",
  m: "V",
  n: "·",
  o: "X",
  p: "△",
  q: "—⌒",
  r: "⌒",
  s: "Ω",
  t: "\\",
  u: "⊃",
  v: "⩑",
  w: "∧",
  x: "⎾_",
  y: "ʔ",
  z: "ʍ"
};

function convert(text) {
  return text
    .toLowerCase()
    .trim()
    .split(/\s+/) // split words
    .map(word =>
      word
        .split("")
        .map(ch => map[ch] ?? ch)
        .join(" ")
    )
    .join(" / ");
}

const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  output.textContent = convert(input.value);
});

function copyText() {
  navigator.clipboard.writeText(output.textContent);
}
</script>

</body>
</html>
