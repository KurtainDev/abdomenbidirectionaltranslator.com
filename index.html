<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Abdomen Font Bidirectional Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #eaeaea;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
  }

  h1 { margin-bottom: 10px; }

  textarea {
    width: 90%;
    max-width: 700px;
    height: 120px;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
  }

  .output {
    width: 90%;
    max-width: 700px;
    min-height: 120px;
    margin-top: 20px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    white-space: pre-wrap;
    font-size: 20px;
  }

  button {
    margin-top: 10px;
    padding: 10px 15px;
    background: #2a2a2a;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #3a3a3a;
  }
</style>
</head>

<body>

<h1>Abdomen Font Bidirectional</h1>

<textarea id="input" placeholder="Type normal OR abdomen text..."></textarea>

<div class="output" id="output"></div>

<button onclick="copyText()">Copy Output</button>

<script>
// forward map (a -> symbol)
const map = {
  a: "0",
  b: "θ",
  c: "]",
  d: "\\",
  e: "<",
  f: "∫",
  g: "q",
  h: "ϟ",
  i: "⊂⊃",
  j: "ʝ",
  k: "☐",
  l: "¿",
  m: "V",
  n: "·",
  o: "X",
  p: "△",
  q: "—⌒",
  r: "⌒",
  s: "Ω",
  t: "*",
  u: "⊃",
  v: "⩑",
  w: "∧",
  x: "⎾_",
  y: "ʔ",
  z: "ʍ"
};

// reverse map (symbol -> a)
const reverseMap = {};
for (const key in map) {
  reverseMap[map[key]] = key;
}

// multi-char symbols first (important for parsing)
const symbols = Object.keys(reverseMap).sort((a, b) => b.length - a.length);

// detect if text is abdomen-like
function isAbdomen(text) {
  return /[θ∫⊂⊃ϟΩ△⌒⩑ʝʍ⎾_·]/.test(text);
}

// normal -> abdomen
function encode(text) {
  return text
    .toLowerCase()
    .split(/\s+/)
    .map(word =>
      word
        .split("")
        .map(ch => map[ch] ?? ch)
        .join(" ")
    )
    .join(" / ");
}

// abdomen -> normal
function decode(text) {
  let words = text.split(/\s*\/\s*/);

  return words
    .map(word => {
      let result = "";

      let i = 0;
      while (i < word.length) {
        let matched = null;

        for (let sym of symbols) {
          if (word.slice(i, i + sym.length) === sym) {
            matched = sym;
            break;
          }
        }

        if (matched) {
          result += reverseMap[matched] ?? "";
          i += matched.length;
        } else if (word[i] !== " ") {
          result += word[i];
          i++;
        } else {
          i++;
        }
      }

      return result;
    })
    .join(" ");
}

const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  const text = input.value;

  if (isAbdomen(text)) {
    output.textContent = decode(text);
  } else {
    output.textContent = encode(text);
  }
});

function copyText() {
  navigator.clipboard.writeText(output.textContent);
}
</script>

</body>
</html>
